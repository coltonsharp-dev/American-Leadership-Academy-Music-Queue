<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALA DJ Player</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <main class="dashboard">
      <section class="card hero-card">
        <div class="hero-top">
          <div class="hero-copy">
            <p class="eyebrow">American Leadership Academy</p>
            <h1>DJ Player Console</h1>
            <p class="hero-sub">
              This page becomes the active Spotify playback device for the queue.
            </p>
          </div>

          <div class="hero-actions">
            <a href="index.html" class="btn">Back to Dashboard</a>
            <button id="btnLogin" class="btn btn-primary" type="button">Login to Spotify</button>
            <button id="btnLogout" class="btn" type="button">Logout</button>
            <button id="btnActivatePlayer" class="btn btn-primary" type="button">Activate Browser Player</button>
          </div>
        </div>

        <div id="status" class="status-pill">Ready.</div>
      </section>

      <section class="card now-playing-card">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Browser Device</p>
            <h2>Spotify Web Player</h2>
          </div>
          <button id="btnRefreshPlayback" class="btn btn-small" type="button">Refresh</button>
        </div>

        <div class="media-card media-card-large">
          <img id="nowPlayingArt" class="media-art large" src="" alt="Now playing artwork" />
          <div class="media-copy">
            <div id="nowPlaying" class="media-title">Nothing currently loaded</div>
            <div id="nowPlayingMeta" class="media-meta">Waiting for playback data...</div>
          </div>
        </div>

        <div class="control-row" style="margin-top:16px;">
          <button id="btnPrevious" class="btn" type="button">Previous</button>
          <button id="btnPause" class="btn" type="button">Pause</button>
          <button id="btnResume" class="btn btn-primary" type="button">Resume</button>
          <button id="btnNext" class="btn" type="button">Next</button>
        </div>
      </section>

      <section class="card up-next-card">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Queue Control</p>
            <h2>Manual Queue Add</h2>
          </div>
        </div>

        <div class="media-card">
          <div class="media-copy" style="width:100%;">
            <label for="queueTrackUri" class="media-meta" style="display:block; margin-bottom:8px;">
              Paste Spotify Track URI or URL
            </label>
            <input
              id="queueTrackUri"
              type="text"
              placeholder="spotify:track:... or https://open.spotify.com/track/..."
              style="width:100%; padding:12px 14px; border-radius:14px; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.05); color:white;"
            />
          </div>
        </div>

        <div class="control-row" style="margin-top:16px;">
          <button id="btnAddManualQueue" class="btn btn-primary" type="button">Add Track to Queue</button>
        </div>
      </section>
    </main>
  </div>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script src="player.js"></script>
</body>
</html>
